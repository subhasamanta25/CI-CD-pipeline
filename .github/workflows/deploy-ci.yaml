name: CI Pipeline

on:
  push:
    branches:
      - main
      - dev
  
  pull_request:
    branches:
      - main

  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade Pipeline
          pip install -r requirements.txt
          pip install pytest

      - name: Debug Environment
        run: |
          pwd
          ls -R
          python --version
          python -c "import os; print(os.getcwd())"
          python -c "import app; print(app.__file__)"

      - name: Run Unit Test
        env:
          PYTHONPATH: ${{ github.worspace }}
        run: |
          pytest

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Run Trivy Scan #scan filesystem
        run: |
          trivy fs --exit-code 1 --severity HIGH,CRITICAL .

      #- name: Run Trivy Scanner
      #  uses: aquasecurity/trivy-action@0.28.0
      #  with:
      #    scan-type: "fs"
      #    scan-ref: "."
      #    severity: "HIGH,CRITICAL"
      #    exit-code: "1"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/flask-app:${{ github.sha }} .
          docker tag ${{ secrets.DOCKER_USERNAME }}/flask-app:${{ github.sha }} \
                     ${{ secrets.DOCKER_USERNAME }}/flask-app:latest

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/flask-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/flask-app:latest

      - name: Success Message
        run: echo "Pipeline completed successfully!"